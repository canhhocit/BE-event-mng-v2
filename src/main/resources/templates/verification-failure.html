<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực thất bại</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #ebf5fb 0%, #aed6f1 100%); height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; color: #2c3e50; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(52, 152, 219, 0.15); text-align: center; max-width: 420px; width: 90%; border: 1px solid #d6eaf8; }
        h1 { color: #c0392b; margin-bottom: 20px; font-size: 26px; font-weight: 700; }
        p { color: #5d6d7e; line-height: 1.7; margin-bottom: 30px; font-size: 15px; }
        .btn { display: inline-block; background: #95a5a6; color: white; padding: 14px 35px; text-decoration: none; border-radius: 10px; font-weight: bold; transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-2px); background: #7f8c8d; }
        .icon { font-size: 60px; margin-bottom: 15px; display: block; color: #e74c3c; }
        .hotline { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">✕</span>
        <h1>Xác thực thất bại!</h1>
        <p>Rất tiếc! Mã xác thực này của bạn không hợp lệ hoặc đã hết hạn. Vui lòng thử đăng ký lại hoặc liên hệ Hotline: <span class="hotline">0329223075</span> để được hỗ trợ.</p>
        <a href="{{frontendUrl}}/register" class="btn">Quay lại Đăng ký</a>
    </div>
</body>
</html>
